name: Deploy to Google Apps Script

on:
  push:
    branches:
      - main  # หากคุณใช้กิ่งชื่อ master ให้เปลี่ยนคำว่า main เป็น master

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: Install Clasp
        run: npm install -g @google/clasp

      - name: Write Clasp Login Token
        run: |
          cat << 'EOF' > ~/.clasprc.json
          ${{ secrets.CLASP_TOKEN }}
          EOF

      - name: Write Project Config
        run: |
          echo '{"scriptId":"${{ secrets.SCRIPT_ID }}","rootDir":"./"}' > .clasp.json

      - name: Push Code to GAS
        run: clasp push -f
