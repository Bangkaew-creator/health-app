<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" name="viewport"/>
    <title>แก้ไขประวัติผู้ป่วย</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms"></script>
    <link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@400;500;600;700&family=Sarabun:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
    <style>
        body { font-family: 'Sarabun', sans-serif; background-color: #f9f9ff; padding-bottom: 100px; -webkit-tap-highlight-color: transparent;}
        .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; }
        .input-field { width: 100%; border: 1px solid #e2e8f0; border-radius: 12px; padding: 12px; font-size: 14px; outline: none; transition: border-color 0.2s; }
        .input-field:focus { border-color: #00694a; box-shadow: 0 0 0 2px rgba(0,105,74,0.1); }
        .disease-cb:checked + label { background-color: #e7eeff; border-color: #00694a; color: #00694a; font-weight: 600; }
    </style>
</head>
<body class="text-[#111c2d]">

    <header class="bg-white sticky top-0 z-50 shadow-sm flex justify-between items-center w-full px-4 h-16 border-b border-[#bdcac1]/30">
        <div class="flex items-center gap-3">
            <button onclick="window.history.back()" class="w-10 h-10 flex items-center justify-center rounded-full bg-gray-50 text-[#00694a] hover:bg-gray-100 transition-colors">
                <span class="material-symbols-outlined">close</span>
            </button>
            <h1 class="text-base font-bold text-[#00694a]">แก้ไขประวัติผู้ป่วย</h1>
        </div>
    </header>

    <main class="max-w-2xl mx-auto p-4 space-y-4">
        <form id="editForm" onsubmit="saveData(event)" class="space-y-4">
            
            <div class="bg-white rounded-[20px] p-5 shadow-sm border border-[#bdcac1]/30 space-y-4">
                <h3 class="font-bold text-[#00694a] flex items-center gap-2 border-b pb-2"><span class="material-symbols-outlined text-lg">person</span> ข้อมูลส่วนตัว</h3>
                
                <div class="grid grid-cols-3 gap-2">
                    <div class="col-span-1">
                        <label class="text-xs text-gray-500 mb-1 block">คำนำหน้า</label>
                        <select id="prefix" class="input-field bg-white" required>
                            <option value="นาย">นาย</option><option value="นาง">นาง</option><option value="นางสาว">นางสาว</option>
                        </select>
                    </div>
                    <div class="col-span-2">
                        <label class="text-xs text-gray-500 mb-1 block">ชื่อ-นามสกุล</label>
                        <input type="text" id="fullname" class="input-field" required>
                    </div>
                </div>

                <div class="grid grid-cols-2 gap-2">
                    <div>
                        <label class="text-xs text-gray-500 mb-1 block">บ้านเลขที่</label>
                        <input type="text" id="house_no" class="input-field" required>
                    </div>
                    <div>
                        <label class="text-xs text-gray-500 mb-1 block">หมู่ที่</label>
                        <input type="number" id="village_no" class="input-field" required>
                    </div>
                </div>

                <div class="pt-2 border-t border-gray-100">
                    <label class="text-xs text-gray-500 mb-1 block">พิกัด GPS บ้านผู้ป่วย</label>
                    <div class="flex gap-2">
                        <input type="text" id="lat_long" class="input-field bg-gray-50 flex-1 text-sm text-gray-600" placeholder="คลิกปุ่มเพื่อดึงพิกัด..." readonly>
                        <button type="button" onclick="getLocation()" class="bg-[#0284c7] text-white px-4 rounded-xl flex items-center justify-center hover:bg-[#0369a1] active:scale-95 transition-all">
                            <span class="material-symbols-outlined text-[18px]">my_location</span>
                        </button>
                    </div>
                    <p id="gps-status" class="text-[10px] text-gray-400 mt-1 text-right"></p>
                </div>
            </div>

            <div class="bg-white rounded-[20px] p-5 shadow-sm border border-[#bdcac1]/30 space-y-4">
                <h3 class="font-bold text-[#ba1a1a] flex items-center gap-2 border-b pb-2"><span class="material-symbols-outlined text-lg">monitor_heart</span> โรคประจำตัว</h3>
                <div class="grid grid-cols-2 gap-2" id="disease-checkboxes"></div>
                <div>
                    <label class="text-xs text-gray-500 mb-1 block">โรคอื่นๆ (ระบุ)</label>
                    <input type="text" id="disease_other" class="input-field" placeholder="พิมพ์ชื่อโรคอื่นๆ (ถ้ามี)...">
                </div>
            </div>

            <div class="bg-white rounded-[20px] p-5 shadow-sm border border-[#bdcac1]/30 space-y-4">
                <div class="flex justify-between items-center border-b pb-2">
                    <h3 class="font-bold text-[#0284c7] flex items-center gap-2"><span class="material-symbols-outlined text-lg">medication</span> รายการยา</h3>
                    <button type="button" onclick="alert('ระบบสแกนฉลากยาเตรียมเปิดใช้งานในเฟสถัดไป')" class="bg-[#f0f9ff] text-[#0284c7] px-3 py-1 rounded-full text-xs font-bold flex items-center gap-1 border border-[#bae6fd]">
                        <span class="material-symbols-outlined text-[14px]">photo_camera</span> สแกนฉลาก
                    </button>
                </div>
                <div id="med-list-container" class="space-y-3"></div>
                <button type="button" onclick="addMedRow()" class="w-full py-3 border-2 border-dashed border-[#bae6fd] text-[#0284c7] rounded-xl font-medium hover:bg-[#f0f9ff] transition-colors flex justify-center items-center gap-1 text-sm">
                    <span class="material-symbols-outlined text-sm">add</span> เพิ่มรายการยา
                </button>
            </div>

            <div class="bg-white rounded-[20px] p-5 shadow-sm border border-[#bdcac1]/30 space-y-4">
                <h3 class="font-bold text-[#F59E0B] flex items-center gap-2 border-b pb-2"><span class="material-symbols-outlined text-lg">group</span> ญาติ / ผู้ดูแล</h3>
                <div>
                    <label class="text-xs text-gray-500 mb-1 block">ชื่อ-นามสกุล ผู้ดูแล</label>
                    <input type="text" id="caregiver_name" class="input-field" placeholder="ชื่อญาติหรือผู้ดูแล...">
                </div>
                <div>
                    <label class="text-xs text-gray-500 mb-1 block">เบอร์โทรศัพท์ติดต่อ</label>
                    <input type="tel" id="caregiver_phone" class="input-field" placeholder="08X-XXX-XXXX">
                </div>
            </div>

        </form>
    </main>

    <div class="fixed bottom-0 left-0 w-full bg-white border-t border-gray-200 shadow-[0_-4px_15px_rgba(0,0,0,0.05)] p-4 z-50">
        <button type="submit" form="editForm" id="btn-save" class="w-full bg-[#00694a] text-white py-3.5 rounded-xl font-bold shadow-md hover:bg-[#005239] active:scale-95 transition-all flex items-center justify-center gap-2">
            บันทึกการแก้ไข
            <span class="material-symbols-outlined text-sm">save</span>
        </button>
    </div>

    <script>
        const API_URL = "https://script.google.com/macros/s/AKfycbyzPy7sklwURcJiqFDzlK4OEQ8616CJLuNyAjb8euQNzYJLXz_dj4UJM63w8-nI1L3r/exec";
        const urlParams = new URLSearchParams(window.location.search);
        const patientId = urlParams.get('id');

        const commonDiseases = ['เบาหวาน', 'ความดันโลหิตสูง', 'ไตวาย', 'หลอดเลือดหัวใจ', 'หลอดเลือดสมอง', 'กล้ามเนื้ออ่อนแรง'];

        function renderDiseaseCheckboxes() {
            const container = document.getElementById('disease-checkboxes');
            commonDiseases.forEach((disease, index) => {
                const id = `disease_${index}`;
                container.innerHTML += `
                    <div>
                        <input type="checkbox" id="${id}" value="${disease}" class="disease-cb hidden">
                        <label for="${id}" class="block w-full text-center py-2 px-1 text-sm border border-gray-200 rounded-lg cursor-pointer transition-colors bg-white text-gray-600">
                            ${disease}
                        </label>
                    </div>
                `;
            });
        }

        function addMedRow(name = '', dose = '', usage = '') {
            const container = document.getElementById('med-list-container');
            const rowId = 'med_' + Date.now();
            const html = `
                <div id="${rowId}" class="bg-gray-50 p-3 rounded-xl border border-gray-100 relative">
                    <button type="button" onclick="document.getElementById('${rowId}').remove()" class="absolute top-2 right-2 text-gray-400 hover:text-red-500">
                        <span class="material-symbols-outlined text-sm">delete</span>
                    </button>
                    <div class="grid grid-cols-2 gap-2 mt-1">
                        <div class="col-span-2"><input type="text" class="med-name input-field bg-white py-2 text-sm" placeholder="ชื่อยา" value="${name}"></div>
                        <div><input type="text" class="med-dose input-field bg-white py-2 text-sm" placeholder="ขนาด" value="${dose}"></div>
                        <div><input type="text" class="med-usage input-field bg-white py-2 text-sm" placeholder="วิธีใช้" value="${usage}"></div>
                    </div>
                </div>
            `;
            container.insertAdjacentHTML('beforeend', html);
        }

        function getLocation() {
            const status = document.getElementById('gps-status');
            const latLongInput = document.getElementById('lat_long');
            if (!navigator.geolocation) {
                status.textContent = "อุปกรณ์ไม่รองรับ GPS";
                return;
            }
            status.textContent = "กำลังค้นหาตำแหน่ง...";
            status.className = "text-[10px] text-[#0284c7] mt-1 text-right animate-pulse";
            navigator.geolocation.getCurrentPosition(
                (position) => {
                    latLongInput.value = `${position.coords.latitude.toFixed(6)}, ${position.coords.longitude.toFixed(6)}`;
                    status.textContent = "✓ ดึงพิกัดสำเร็จ!";
                    status.className = "text-[10px] text-[#00694a] mt-1 text-right font-bold";
                },
                (error) => {
                    status.textContent = "x ไม่สามารถดึงพิกัดได้";
                    status.className = "text-[10px] text-[#ba1a1a] mt-1 text-right";
                }, { enableHighAccuracy: true }
            );
        }

        async function loadPatientData() {
            renderDiseaseCheckboxes();
            if (!patientId) return alert("ไม่พบรหัสผู้ป่วย");
            document.getElementById('btn-save').innerHTML = 'กำลังโหลด...';
            document.getElementById('btn-save').disabled = true;

            try {
                const response = await fetch(API_URL, {
                    method: 'POST', body: JSON.stringify({ action: 'getPatientById', id: patientId })
                });
                const data = await response.json();
                if (data.error) { alert(data.error); return; }

                document.getElementById('prefix').value = data.prefix || 'นาย';
                document.getElementById('fullname').value = data.name || '';
                document.getElementById('house_no').value = data.house_no || '';
                document.getElementById('village_no').value = data.village_no || '';
                document.getElementById('lat_long').value = data.lat_long || '';
                document.getElementById('caregiver_name').value = data.caregiver_name || '';
                document.getElementById('caregiver_phone').value = data.caregiver_phone || '';

                if (data.disease) {
                    const savedDiseases = data.disease.split(',').map(item => item.trim());
                    let otherDiseases = [];
                    savedDiseases.forEach(d => {
                        if (commonDiseases.includes(d)) { document.getElementById(`disease_${commonDiseases.indexOf(d)}`).checked = true; } 
                        else if (d !== '') { otherDiseases.push(d); }
                    });
                    document.getElementById('disease_other').value = otherDiseases.join(', ');
                }

                if (data.medication && data.medication.startsWith('[')) {
                    try { JSON.parse(data.medication).forEach(med => addMedRow(med.name, med.dose, med.usage)); } 
                    catch(e) { addMedRow(); }
                } else if (data.medication) { addMedRow(data.medication, '', ''); } 
                else { addMedRow(); }

                document.getElementById('btn-save').innerHTML = 'บันทึกการแก้ไข <span class="material-symbols-outlined text-sm">save</span>';
                document.getElementById('btn-save').disabled = false;
            } catch (error) { alert("โหลดข้อมูลล้มเหลว"); }
        }

        async function saveData(e) {
            e.preventDefault();
            const btn = document.getElementById('btn-save');
            btn.innerHTML = 'กำลังบันทึก...'; btn.disabled = true;

            let finalDiseases = [];
            document.querySelectorAll('.disease-cb:checked').forEach(cb => finalDiseases.push(cb.value));
            if (document.getElementById('disease_other').value.trim()) finalDiseases.push(document.getElementById('disease_other').value.trim());

            let medArray = [];
            document.querySelectorAll('[id^="med_"]').forEach(row => {
                const name = row.querySelector('.med-name').value.trim();
                const dose = row.querySelector('.med-dose').value.trim();
                const usage = row.querySelector('.med-usage').value.trim();
                if (name || dose || usage) medArray.push({ name, dose, usage });
            });

            const updateData = {
                id: patientId,
                prefix: document.getElementById('prefix').value,
                fullname: document.getElementById('fullname').value,
                house_no: document.getElementById('house_no').value,
                village_no: document.getElementById('village_no').value,
                lat_long: document.getElementById('lat_long').value,
                disease: finalDiseases.join(', '),
                medication: JSON.stringify(medArray),
                caregiver_name: document.getElementById('caregiver_name').value,
                caregiver_phone: document.getElementById('caregiver_phone').value
            };

            try {
                const response = await fetch(API_URL, {
                    method: 'POST', body: JSON.stringify({ action: 'updatePatientData', data: updateData })
                });
                const result = await response.json();
                if (result.success) {
                    alert('บันทึกข้อมูลเรียบร้อยแล้ว!');
                    window.location.href = `patient_profile.html?id=${patientId}`;
                } else { alert('เกิดข้อผิดพลาด: ' + result.error); }
            } catch (err) { alert('การเชื่อมต่อล้มเหลว'); }
            
            btn.innerHTML = 'บันทึกการแก้ไข <span class="material-symbols-outlined text-sm">save</span>'; btn.disabled = false;
        }

        loadPatientData();
    </script>
</body>
</html>
