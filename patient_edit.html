<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" name="viewport"/>
    <title>แก้ไขประวัติผู้ป่วย</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms"></script>
    <link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@400;500;600;700&family=Sarabun:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
    <style>
        body { font-family: 'Sarabun', sans-serif; background-color: #f9f9ff; padding-bottom: 100px; -webkit-tap-highlight-color: transparent;}
        .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; }
        .input-field { width: 100%; border: 1px solid #e2e8f0; border-radius: 12px; padding: 12px; font-size: 14px; outline: none; transition: border-color 0.2s; }
        .input-field:focus { border-color: #00694a; ring: 2px solid #00694a; }
    </style>
</head>
<body class="text-[#111c2d]">

    <!-- Header -->
    <header class="bg-white sticky top-0 z-50 shadow-sm flex justify-between items-center w-full px-4 h-16 border-b border-[#bdcac1]/30">
        <div class="flex items-center gap-3">
            <button onclick="window.history.back()" class="w-10 h-10 flex items-center justify-center rounded-full bg-gray-50 text-[#00694a] hover:bg-gray-100 transition-colors">
                <span class="material-symbols-outlined">close</span>
            </button>
            <h1 class="text-base font-bold text-[#00694a]">แก้ไขประวัติผู้ป่วย</h1>
        </div>
    </header>

    <main class="max-w-2xl mx-auto p-4 space-y-4">
        <form id="editForm" onsubmit="saveData(event)" class="space-y-4">
            
            <!-- ส่วนที่ 1: ข้อมูลทั่วไป -->
            <div class="bg-white rounded-[20px] p-5 shadow-sm border border-[#bdcac1]/30 space-y-4">
                <h3 class="font-bold text-[#00694a] flex items-center gap-2 border-b pb-2"><span class="material-symbols-outlined text-lg">person</span> ข้อมูลส่วนตัวและที่อยู่</h3>
                
                <div class="grid grid-cols-3 gap-2">
                    <div class="col-span-1">
                        <label class="text-xs text-gray-500 mb-1 block">คำนำหน้า</label>
                        <select id="prefix" class="input-field bg-white" required>
                            <option value="นาย">นาย</option><option value="นาง">นาง</option><option value="นางสาว">นางสาว</option>
                        </select>
                    </div>
                    <div class="col-span-2">
                        <label class="text-xs text-gray-500 mb-1 block">ชื่อ-นามสกุล</label>
                        <input type="text" id="fullname" class="input-field" required>
                    </div>
                </div>

                <div class="grid grid-cols-2 gap-2">
                    <div>
                        <label class="text-xs text-gray-500 mb-1 block">บ้านเลขที่</label>
                        <input type="text" id="house_no" class="input-field" required>
                    </div>
                    <div>
                        <label class="text-xs text-gray-500 mb-1 block">หมู่ที่</label>
                        <input type="number" id="village_no" class="input-field" required>
                    </div>
                </div>
            </div>

            <!-- ส่วนที่ 2: ข้อมูลสุขภาพ -->
            <div class="bg-white rounded-[20px] p-5 shadow-sm border border-[#bdcac1]/30 space-y-4">
                <h3 class="font-bold text-[#ba1a1a] flex items-center gap-2 border-b pb-2"><span class="material-symbols-outlined text-lg">favorite</span> ข้อมูลสุขภาพ</h3>
                
                <div>
                    <label class="text-xs text-gray-500 mb-1 block">โรคประจำตัว (ถ้ามี)</label>
                    <textarea id="disease" rows="2" class="input-field" placeholder="เช่น เบาหวาน, ความดัน..."></textarea>
                </div>
                <div>
                    <label class="text-xs text-gray-500 mb-1 block">ยาที่ใช้ประจำ</label>
                    <textarea id="medication" rows="2" class="input-field" placeholder="ระบุชื่อยา..."></textarea>
                </div>
            </div>

            <!-- ส่วนที่ 3: ข้อมูลผู้ดูแล -->
            <div class="bg-white rounded-[20px] p-5 shadow-sm border border-[#bdcac1]/30 space-y-4">
                <h3 class="font-bold text-[#F59E0B] flex items-center gap-2 border-b pb-2"><span class="material-symbols-outlined text-lg">group</span> ญาติ / ผู้ดูแลใกล้ชิด</h3>
                
                <div>
                    <label class="text-xs text-gray-500 mb-1 block">ชื่อ-นามสกุล ผู้ดูแล</label>
                    <input type="text" id="caregiver_name" class="input-field" placeholder="ชื่อญาติหรือผู้ดูแล...">
                </div>
                <div>
                    <label class="text-xs text-gray-500 mb-1 block">เบอร์โทรศัพท์ติดต่อ</label>
                    <input type="tel" id="caregiver_phone" class="input-field" placeholder="08X-XXX-XXXX">
                </div>
            </div>

        </form>
    </main>

    <!-- ปุ่มบันทึกด้านล่าง -->
    <div class="fixed bottom-0 left-0 w-full bg-white border-t border-gray-200 shadow-[0_-4px_15px_rgba(0,0,0,0.05)] p-4 z-50">
        <button type="submit" form="editForm" id="btn-save" class="w-full bg-[#00694a] text-white py-3.5 rounded-xl font-bold shadow-md hover:bg-[#005239] active:scale-95 transition-all flex items-center justify-center gap-2">
            บันทึกการแก้ไข
            <span class="material-symbols-outlined text-sm">save</span>
        </button>
    </div>

    <script>
        const API_URL = "https://script.google.com/macros/s/AKfycbyzPy7sklwURcJiqFDzlK4OEQ8616CJLuNyAjb8euQNzYJLXz_dj4UJM63w8-nI1L3r/exec";
        
        const urlParams = new URLSearchParams(window.location.search);
        const patientId = urlParams.get('id');

        // ฟังก์ชันดึงข้อมูลเดิมมาใส่ในฟอร์ม (Pre-fill)
        async function loadPatientData() {
            if (!patientId) return alert("ไม่พบรหัสผู้ป่วย");
            
            document.getElementById('btn-save').innerHTML = 'กำลังโหลดข้อมูล...';
            document.getElementById('btn-save').disabled = true;

            try {
                const response = await fetch(API_URL, {
                    method: 'POST', body: JSON.stringify({ action: 'getPatientById', id: patientId })
                });
                const data = await response.json();
                
                if (data.error) {
                    alert(data.error); window.history.back(); return;
                }

                // เติมข้อมูลลงช่องต่างๆ
                document.getElementById('prefix').value = data.prefix || 'นาย';
                document.getElementById('fullname').value = data.name || '';
                document.getElementById('house_no').value = data.house_no || '';
                document.getElementById('village_no').value = data.village_no || '';
                document.getElementById('disease').value = data.disease || '';
                document.getElementById('medication').value = data.medication || '';
                document.getElementById('caregiver_name').value = data.caregiver_name || '';
                document.getElementById('caregiver_phone').value = data.caregiver_phone || '';

                document.getElementById('btn-save').innerHTML = 'บันทึกการแก้ไข <span class="material-symbols-outlined text-sm">save</span>';
                document.getElementById('btn-save').disabled = false;

            } catch (error) {
                alert("โหลดข้อมูลล้มเหลว");
            }
        }

        // ฟังก์ชันส่งข้อมูลที่แก้ไขแล้วกลับไปบันทึก
        async function saveData(e) {
            e.preventDefault();
            const btn = document.getElementById('btn-save');
            btn.innerHTML = 'กำลังบันทึก...'; btn.disabled = true;

            const updateData = {
                id: patientId,
                prefix: document.getElementById('prefix').value,
                fullname: document.getElementById('fullname').value,
                house_no: document.getElementById('house_no').value,
                village_no: document.getElementById('village_no').value,
                disease: document.getElementById('disease').value,
                medication: document.getElementById('medication').value,
                caregiver_name: document.getElementById('caregiver_name').value,
                caregiver_phone: document.getElementById('caregiver_phone').value
            };

            try {
                const response = await fetch(API_URL, {
                    method: 'POST',
                    body: JSON.stringify({ action: 'updatePatientData', data: updateData })
                });
                
                const result = await response.json();
                if (result.success) {
                    alert('บันทึกข้อมูลเรียบร้อยแล้ว!');
                    window.location.href = `patient_profile.html?id=${patientId}`; // กลับไปหน้าโปรไฟล์
                } else {
                    alert('เกิดข้อผิดพลาด: ' + result.error);
                }
            } catch (err) {
                alert('การเชื่อมต่อล้มเหลว');
            }
            btn.innerHTML = 'บันทึกการแก้ไข <span class="material-symbols-outlined text-sm">save</span>'; btn.disabled = false;
        }

        // โหลดข้อมูลทันทีเมื่อเปิดหน้าต่าง
        loadPatientData();
    </script>
</body>
</html>
