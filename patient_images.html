<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" name="viewport"/>
    <title>จัดการรูปภาพผู้ป่วย</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms"></script>
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
    
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore-compat.js"></script>
    <script src="config.js"></script>

    <style>
        body { font-family: 'Sarabun', sans-serif; background-color: #f9f9ff; -webkit-tap-highlight-color: transparent; }
        .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; }
        .upload-card { position: relative; border: 2px dashed #cbd5e1; border-radius: 16px; overflow: hidden; background-color: #ffffff; aspect-ratio: 4/3; display: flex; flex-direction: column; align-items: center; justify-content: center; transition: all 0.2s; cursor: pointer; }
        .upload-card:active { transform: scale(0.98); border-color: #0284c7; }
        .preview-img { width: 100%; height: 100%; object-fit: cover; }
        .loading-overlay { position: absolute; inset: 0; background-color: rgba(255,255,255,0.85); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 10; }
        .spinner { border: 3px solid #f3f3f3; border-top: 3px solid #0284c7; border-radius: 50%; width: 24px; height: 24px; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body class="text-[#111c2d] pb-12">

    <header class="bg-white sticky top-0 z-50 shadow-sm flex justify-between items-center w-full px-4 h-16 border-b border-gray-200">
        <div class="flex items-center gap-3">
            <button onclick="window.history.back()" class="w-10 h-10 flex items-center justify-center rounded-full bg-gray-50 text-[#0284c7] hover:bg-gray-100">
                <span class="material-symbols-outlined">arrow_back</span>
            </button>
            <div>
                <h1 class="text-base font-bold text-[#0284c7]">อัลบั้มภาพถ่ายผู้ป่วย</h1>
                <p class="text-xs text-gray-500" id="patient-id-display">รหัส: กำลังโหลด...</p>
            </div>
        </div>
    </header>

    <main class="max-w-2xl mx-auto p-4 space-y-6">

        <section class="bg-white rounded-[20px] p-5 shadow-sm border border-gray-100 flex flex-col items-center space-y-3">
            <h3 class="text-sm font-bold text-gray-700 w-full text-left flex items-center gap-1">
                <span class="material-symbols-outlined text-base">account_circle</span> รูปโปรไฟล์ผู้ป่วย
            </h3>
            
            <div onclick="triggerUpload('Profile_Pic')" class="relative w-32 h-32 rounded-full border-2 dashed border-gray-300 overflow-hidden bg-gray-50 flex flex-col items-center justify-center cursor-pointer shadow-inner" id="card-Profile_Pic">
                <div class="loading-overlay hidden" id="loading-Profile_Pic"><div class="spinner"></div><p class="text-[10px] text-[#0284c7] mt-1 font-bold">กำลังอัปโหลด</p></div>
                <div class="text-center text-gray-400" id="placeholder-Profile_Pic">
                    <span class="material-symbols-outlined text-3xl">add_a_photo</span>
                    <p class="text-[10px] mt-1">เพิ่มรูปภาพ</p>
                </div>
                <img src="" class="preview-img hidden rounded-full" id="img-Profile_Pic" alt="Profile">
            </div>
            <p class="text-[11px] text-gray-400">แตะที่รูปเพื่อถ่ายภาพหรือเปลี่ยนรูปโปรไฟล์</p>
        </section>

        <section class="bg-white rounded-[20px] p-5 shadow-sm border border-gray-100 space-y-4">
            <h3 class="text-sm font-bold text-gray-700 flex items-center gap-1 border-b pb-2">
                <span class="material-symbols-outlined text-base">cabin</span> สภาพแวดล้อมบ้านผู้ป่วย
            </h3>

            <div class="grid grid-cols-2 gap-4">
                <!-- จุดที่ 1 -->
                <div class="space-y-1">
                    <label class="text-xs text-gray-500 font-medium">1. สภาพที่นอน/เตียง</label>
                    <div onclick="triggerUpload('Pic_Bed')" class="upload-card" id="card-Pic_Bed">
                        <div class="loading-overlay hidden" id="loading-Pic_Bed"><div class="spinner"></div></div>
                        <div class="text-center text-gray-400" id="placeholder-Pic_Bed">
                            <span class="material-symbols-outlined text-2xl">bed</span>
                            <p class="text-[10px] mt-0.5">ถ่ายภาพ</p>
                        </div>
                        <img src="" class="preview-img hidden" id="img-Pic_Bed" alt="Bed">
                    </div>
                </div>

                <!-- จุดที่ 2 -->
                <div class="space-y-1">
                    <label class="text-xs text-gray-500 font-medium">2. สภาพห้องน้ำ</label>
                    <div onclick="triggerUpload('Pic_Bath')" class="upload-card" id="card-Pic_Bath">
                        <div class="loading-overlay hidden" id="loading-Pic_Bath"><div class="spinner"></div></div>
                        <div class="text-center text-gray-400" id="placeholder-Pic_Bath">
                            <span class="material-symbols-outlined text-2xl">bathtub</span>
                            <p class="text-[10px] mt-0.5">ถ่ายภาพ</p>
                        </div>
                        <img src="" class="preview-img hidden" id="img-Pic_Bath" alt="Bathroom">
                    </div>
                </div>

                <!-- จุดที่ 3 -->
                <div class="space-y-1">
                    <label class="text-xs text-gray-500 font-medium">3. ทางเข้าบ้าน/บันได</label>
                    <div onclick="triggerUpload('Pic_Entrance')" class="upload-card" id="card-Pic_Entrance">
                        <div class="loading-overlay hidden" id="loading-Pic_Entrance"><div class="spinner"></div></div>
                        <div class="text-center text-gray-400" id="placeholder-Pic_Entrance">
                            <span class="material-symbols-outlined text-2xl">door_front</span>
                            <p class="text-[10px] mt-0.5">ถ่ายภาพ</p>
                        </div>
                        <img src="" class="preview-img hidden" id="img-Pic_Entrance" alt="Entrance">
                    </div>
                </div>

                <!-- จุดที่ 4 -->
                <div class="space-y-1">
                    <label class="text-xs text-gray-500 font-medium">4. ทางเดินภายในบ้าน</label>
                    <div onclick="triggerUpload('Pic_Walkway')" class="upload-card" id="card-Pic_Walkway">
                        <div class="loading-overlay hidden" id="loading-Pic_Walkway"><div class="spinner"></div></div>
                        <div class="text-center text-gray-400" id="placeholder-Pic_Walkway">
                            <span class="material-symbols-outlined text-2xl">sensor_door</span>
                            <p class="text-[10px] mt-0.5">ถ่ายภาพ</p>
                        </div>
                        <img src="" class="preview-img hidden" id="img-Pic_Walkway" alt="Walkway">
                    </div>
                </div>
            </div>
        </section>

    </main>

    <input type="file" id="file-hidden-input" accept="image/*" class="hidden" onchange="handleFileSelect(event)">

    <script>
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        const urlParams = new URLSearchParams(window.location.search);
        const patientId = urlParams.get('id');
        
        document.getElementById('patient-id-display').innerText = `รหัส: ${patientId || '-'}`;
        
        let currentTargetType = ''; 

        function triggerUpload(type) {
            currentTargetType = type;
            document.getElementById('file-hidden-input').click();
        }

        async function loadExistingImages() {
            if (!patientId) return;
            try {
                // 1. โหลดรูปโปรไฟล์ (ยังเก็บไว้ที่ Document หลักเพื่อให้ดึงโชว์หน้ารายชื่อได้เร็ว)
                const docSnap = await db.collection('Patients').doc(String(patientId)).get();
                if (docSnap.exists) {
                    const data = docSnap.data();
                    displaySavedImage('Profile_Pic', data.profile_pic);
                }

                // 2. โหลดรูปสภาพแวดล้อมต่างๆ จาก Subcollection "Images" (ไม่จำกัดจำนวน 1MB)
                const imagesSnap = await db.collection('Patients').doc(String(patientId)).collection('Images').get();
                imagesSnap.forEach(imgDoc => {
                    const imgType = imgDoc.id; // ไอดีของเอกสารคือชื่อประเภทรูป เช่น Pic_Bed
                    const imgData = imgDoc.data();
                    displaySavedImage(imgType, imgData.url);
                });

            } catch (e) { console.log("โหลดภาพเดิมไม่สำเร็จ", e); }
        }

        function displaySavedImage(type, url) {
            // ตรวจสอบว่าใน HTML มีกล่องรูปนี้ให้แสดงหรือไม่
            const imgElement = document.getElementById(`img-${type}`);
            const placeholderElement = document.getElementById(`placeholder-${type}`);
            
            if (imgElement && url && (url.startsWith('http') || url.startsWith('data:image'))) {
                let directUrl = url;
                const match = url.match(/d\/([a-zA-Z0-9_-]+)/) || url.match(/id=([a-zA-Z0-9_-]+)/);
                if (match && match[1]) {
                    directUrl = `https://drive.google.com/thumbnail?id=${match[1]}&sz=w800`;
                }
                
                imgElement.src = directUrl;
                imgElement.classList.remove('hidden');
                if (placeholderElement) placeholderElement.classList.add('hidden');
            }
        }

        function compressImage(file, callback) {
            const reader = new FileReader();
            reader.onload = function(event) {
                const img = new Image();
                img.onload = function() {
                    const MAX_WIDTH = 600; 
                    const MAX_HEIGHT = 600;
                    let width = img.width;
                    let height = img.height;

                    if (width > height) {
                        if (width > MAX_WIDTH) { height = Math.round(height * (MAX_WIDTH / width)); width = MAX_WIDTH; }
                    } else {
                        if (height > MAX_HEIGHT) { width = Math.round(width * (MAX_HEIGHT / height)); height = MAX_HEIGHT; }
                    }

                    const canvas = document.createElement('canvas');
                    canvas.width = width;
                    canvas.height = height;
                    const ctx = canvas.getContext('2d');
                    ctx.drawImage(img, 0, 0, width, height);
                    
                    const dataUrl = canvas.toDataURL('image/jpeg', 0.6); 
                    callback(dataUrl); 
                };
                img.src = event.target.result;
            };
            reader.readAsDataURL(file);
        }

        function handleFileSelect(event) {
            const file = event.target.files[0];
            if (!file) return;

            const loading = document.getElementById(`loading-${currentTargetType}`);
            loading.classList.remove('hidden'); 

            compressImage(file, async function(base64DataUrl) {
                try {
                    // 1. แสดงผลหน้าจอมือถือทันที
                    const img = document.getElementById(`img-${currentTargetType}`);
                    const placeholder = document.getElementById(`placeholder-${currentTargetType}`);
                    img.src = base64DataUrl;
                    img.classList.remove('hidden');
                    placeholder.classList.add('hidden');

                    if (currentTargetType === 'Profile_Pic') {
                        // รูปโปรไฟล์ เก็บใน Document หลัก เพื่อให้ดึงไปโชว์ในหน้ารายชื่อคนไข้ (patient_list) ได้ง่าย
                        await db.collection('Patients').doc(String(patientId)).update({
                            profile_pic: base64DataUrl
                        });
                    } else {
                        // รูปอื่นๆ (ที่นอน, ห้องน้ำ, ทางเดิน, ยา ฯลฯ) เก็บแยกใน Subcollection "Images"
                        await db.collection('Patients').doc(String(patientId)).collection('Images').doc(currentTargetType).set({
                            url: base64DataUrl,
                            updated_at: firebase.firestore.FieldValue.serverTimestamp()
                        });
                    }

                } catch (err) {
                    console.error(err);
                    alert('เกิดข้อผิดพลาดในการบันทึกรูปภาพ กรุณาลองใหม่ครับ');
                } finally {
                    loading.classList.add('hidden'); 
                    event.target.value = ''; 
                }
            });
        }

        loadExistingImages();
    </script>
</body>
</html>
