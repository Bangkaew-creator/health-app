<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" name="viewport"/>
    <title>หน้าหลัก - Health Volunteer</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms"></script>
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
    <style>
        body { font-family: 'Sarabun', sans-serif; background-color: #f8fafc; padding-bottom: 90px; -webkit-tap-highlight-color: transparent;}
        .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; }
        .filter-pill { padding: 8px 16px; border-radius: 20px; font-size: 12px; font-weight: bold; border: 1px solid #e2e8f0; background-color: #ffffff; color: #526069; transition: all 0.2s; cursor: pointer; white-space: nowrap; }
        .filter-pill.active { background-color: #00694a; color: #ffffff; border-color: #00694a; box-shadow: 0 4px 10px rgba(0,105,74,0.15); }
        .loader { border: 3px solid #d8e3fb; border-bottom-color: #00694a; border-radius: 50%; width: 36px; height: 36px; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body class="text-[#111c2d]">

    <header class="bg-[#00694a] sticky top-0 z-50 shadow-md flex justify-between items-center w-full px-4 h-16 text-white">
        <div class="flex items-center gap-3">
            <span class="material-symbols-outlined text-3xl" style="font-variation-settings: 'FILL' 1;">add_box</span>
            <div class="flex flex-col">
                <h1 class="text-base font-bold leading-tight text-white">ระบบ อสม. พึ่งพิง</h1>
                <p class="text-[10px] text-white/80 font-medium">เทศบาลเมืองบางแก้ว</p>
            </div>
        </div>
        <button onclick="window.location.href='map_overview.html'" class="w-10 h-10 flex items-center justify-center rounded-full hover:bg-white/20 transition-colors">
            <span class="material-symbols-outlined text-2xl">location_on</span>
        </button>
    </header>

    <main class="max-w-2xl mx-auto p-4 space-y-4">
        
        <div class="grid grid-cols-4 gap-2">
            <div class="bg-white rounded-xl p-3 shadow-sm border border-gray-100 flex flex-col items-center justify-center">
                <span class="text-[11px] font-bold text-gray-400 mb-1">ทั้งหมด</span>
                <span class="text-2xl font-bold text-gray-800" id="stat-all">-</span>
            </div>
            <div class="bg-white rounded-xl p-3 shadow-sm border border-gray-100 flex flex-col items-center justify-center">
                <span class="text-[11px] font-bold text-[#00694a] mb-1">ติดสังคม</span>
                <span class="text-2xl font-bold text-[#00694a]" id="stat-social">-</span>
            </div>
            <div class="bg-white rounded-xl p-3 shadow-sm border border-gray-100 flex flex-col items-center justify-center">
                <span class="text-[11px] font-bold text-[#F59E0B] mb-1">ติดบ้าน</span>
                <span class="text-2xl font-bold text-[#F59E0B]" id="stat-home">-</span>
            </div>
            <div class="bg-white rounded-xl p-3 shadow-sm border border-gray-100 flex flex-col items-center justify-center">
                <span class="text-[11px] font-bold text-[#ba1a1a] mb-1">ติดเตียง</span>
                <span class="text-2xl font-bold text-[#ba1a1a]" id="stat-bed">-</span>
            </div>
        </div>

        <div class="relative">
            <span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-gray-400">search</span>
            <input type="text" id="search-input" oninput="filterPatients()" class="w-full pl-11 pr-4 py-3 bg-white border border-gray-200 rounded-xl text-sm focus:outline-none focus:border-[#00694a] focus:ring-1 focus:ring-[#00694a] shadow-sm text-gray-700" placeholder="ค้นหาชื่อผู้ป่วย หรือบ้านเลขที่...">
        </div>

        <div class="flex gap-2 overflow-x-auto pb-1 -mx-4 px-4 scrollbar-hidden">
            <button onclick="changeFilter('all', this)" class="filter-pill active whitespace-nowrap">ทั้งหมด (<span id="count-all">0</span>)</button>
            <button onclick="changeFilter('visited', this)" class="filter-pill whitespace-nowrap">เยี่ยมแล้ววันนี้ (<span id="count-visited">0</span>)</button>
            <button onclick="changeFilter('pending', this)" class="filter-pill whitespace-nowrap">ค้างประเมิน (<span id="count-pending">0</span>)</button>
            <button onclick="changeFilter('new', this)" class="filter-pill whitespace-nowrap">รายใหม่ (<span id="count-new">0</span>)</button>
        </div>

        <div id="loading-state" class="flex flex-col items-center justify-center py-16 space-y-3">
            <div class="loader"></div>
            <p class="text-xs text-gray-400 animate-pulse">กำลังดึงข้อมูล...</p>
        </div>

        <div id="patient-list" class="space-y-3 hidden"></div>
        
        <div id="empty-state" class="hidden text-center py-16 space-y-2 text-gray-400">
            <span class="material-symbols-outlined text-4xl">person_search</span>
            <p class="text-xs">ไม่พบข้อมูลที่ตรงตามเงื่อนไข</p>
        </div>

    </main>

    <nav class="fixed bottom-0 left-0 w-full bg-white border-t border-gray-200 shadow-[0_-2px_10px_rgba(0,0,0,0.03)] grid grid-cols-3 h-16 z-50">
        <button onclick="window.location.href='dashboard.html'" class="flex flex-col items-center justify-center text-[#00694a] font-bold">
            <span class="material-symbols-outlined mb-0.5" style="font-variation-settings: 'FILL' 1;">home</span>
            <span class="text-[10px]">หน้าหลัก</span>
        </button>
        <button onclick="window.location.href='assessments.html'" class="flex flex-col items-center justify-center text-gray-400 hover:text-gray-600">
            <span class="material-symbols-outlined mb-0.5">assignment_turned_in</span>
            <span class="text-[10px]">งานประเมิน</span>
        </button>
        <button onclick="window.location.href='vhv_settings.html'" class="flex flex-col items-center justify-center text-gray-400 hover:text-gray-600">
            <span class="material-symbols-outlined mb-0.5">manage_accounts</span>
            <span class="text-[10px]">ตั้งค่า</span>
        </button>
    </nav>

    <script>
        const API_URL = "https://script.google.com/macros/s/AKfycbyzPy7sklwURcJiqFDzlK4OEQ8616CJLuNyAjb8euQNzYJLXz_dj4UJM63w8-nI1L3r/exec";
        
        let allPatients = []; 
        let currentFilter = 'all'; 

        async function fetchPatients() {
            try {
                const response = await fetch(API_URL, { method: 'POST', body: JSON.stringify({ action: 'getAllPatients' }) });
                allPatients = await response.json();
                
                updateTopSummaryCards();
                calculateSummaryCounts();
                renderPatientList();
                
                document.getElementById('loading-state').classList.add('hidden');
                document.getElementById('patient-list').classList.remove('hidden');
            } catch (error) {
                alert("ไม่สามารถเชื่อมต่อฐานข้อมูลได้");
            }
        }

        // อัปเดตตัวเลข 4 การ์ดบนสุด
        function updateTopSummaryCards() {
            document.getElementById('stat-all').innerText = allPatients.length;
            document.getElementById('stat-social').innerText = allPatients.filter(p => p.group === 'ติดสังคม').length;
            document.getElementById('stat-home').innerText = allPatients.filter(p => p.group === 'ติดบ้าน').length;
            document.getElementById('stat-bed').innerText = allPatients.filter(p => p.group === 'ติดเตียง').length;
        }

        // อัปเดตตัวเลขในปุ่มกดแคปซูล
        function calculateSummaryCounts() {
            const todayStr = getTodayString();
            const visitedCount = allPatients.filter(p => p.last_assess === todayStr).length;
            const pendingCount = allPatients.filter(p => p.group === 'ยังไม่ประเมิน' || p.adl === '-').length;
            const newCount = allPatients.filter(p => p.last_assess === '').length;

            document.getElementById('count-all').innerText = allPatients.length;
            document.getElementById('count-visited').innerText = visitedCount;
            document.getElementById('count-pending').innerText = pendingCount;
            document.getElementById('count-new').innerText = newCount;
        }

        function changeFilter(filterType, element) {
            document.querySelectorAll('.filter-pill').forEach(btn => btn.classList.remove('active'));
            element.classList.add('active');
            currentFilter = filterType;
            renderPatientList();
        }

        function renderPatientList() {
            const container = document.getElementById('patient-list');
            const emptyState = document.getElementById('empty-state');
            const searchKeyword = document.getElementById('search-input').value.trim().toLowerCase();
            const todayStr = getTodayString();
            
            container.innerHTML = '';
            let displayCount = 0;

            allPatients.forEach(p => {
                // กรองแคปซูล
                if (currentFilter === 'visited' && p.last_assess !== todayStr) return;
                if (currentFilter === 'pending' && p.group !== 'ยังไม่ประเมิน' && p.adl !== '-') return;
                if (currentFilter === 'new' && p.last_assess !== '') return;

                // กรองช่องค้นหา
                const nameMatch = p.name ? p.name.toLowerCase().includes(searchKeyword) : false;
                const houseMatch = p.house_no ? p.house_no.toLowerCase().includes(searchKeyword) : false;
                const villageMatch = p.village_no ? String(p.village_no).includes(searchKeyword) : false;
                if (searchKeyword && !nameMatch && !houseMatch && !villageMatch) return;

                displayCount++;

                // สีและป้ายบอกกลุ่ม
                let groupColor = 'bg-gray-500';
                if (p.group === 'ติดสังคม') groupColor = 'bg-[#00694a]';
                else if (p.group === 'ติดบ้าน') groupColor = 'bg-[#F59E0B]';
                else if (p.group === 'ติดเตียง') groupColor = 'bg-[#ba1a1a]';

                // รูปโปรไฟล์ (ถ้าไม่มีรูป ใช้สีเขียวอ่อนตัวหนังสือสีเขียวเข้มแบบในภาพ)
                let avatarHtml = `<div class="w-12 h-12 rounded-full bg-[#e8f5e9] text-[#00694a] font-bold text-xl flex items-center justify-center">${p.name ? p.name.substring(0,1) : '?'}</div>`;
                if(p.profile_pic && p.profile_pic.startsWith('http')) {
                    const match = p.profile_pic.match(/d\/([a-zA-Z0-9_-]+)/) || p.profile_pic.match(/id=([a-zA-Z0-9_-]+)/);
                    if(match) avatarHtml = `<img src="https://drive.google.com/thumbnail?id=${match[1]}&sz=150" class="w-12 h-12 rounded-full object-cover shadow-sm">`;
                }

                let vVitals = `ความดัน: <span class="font-semibold text-gray-700">${p.bp || '-'}</span> | ชีพจร: <span class="font-semibold text-gray-700">${p.hr || '-'}</span>`;

                // การ์ดผู้ป่วย (ถอดแบบจากรูปเป๊ะๆ)
                const cardHtml = `
                    <div onclick="window.location.href='patient_profile.html?id=${p.id}'" class="bg-white rounded-xl p-4 border border-gray-100 shadow-sm flex items-center gap-4 cursor-pointer active:scale-[0.99] transition-transform">
                        ${avatarHtml}
                        <div class="flex-1 min-w-0">
                            <h3 class="font-bold text-sm text-gray-900 truncate">${p.name || 'ไม่ระบุชื่อ'}</h3>
                            <p class="text-[11px] text-gray-500 mt-0.5">บ้านเลขที่ ${p.house_no || '-'} หมู่ ${p.village_no || '-'}</p>
                            <p class="text-[11px] text-gray-400 mt-0.5">${vVitals}</p>
                        </div>
                        <div class="flex flex-col items-end gap-1.5">
                            <span class="${groupColor} text-white text-[10px] font-bold px-2.5 py-0.5 rounded-full">${p.group}</span>
                            <span class="text-[10px] text-gray-500 bg-gray-50 border border-gray-200 px-2.5 py-0.5 rounded-md font-semibold">ADL: ${p.adl || '-'}</span>
                        </div>
                    </div>
                `;
                container.insertAdjacentHTML('beforeend', cardHtml);
            });

            if (displayCount === 0) emptyState.classList.remove('hidden');
            else emptyState.classList.add('hidden');
        }

        function filterPatients() { renderPatientList(); }

        function getTodayString() {
            const today = new Date();
            const dd = String(today.getDate()).padStart(2, '0');
            const mm = String(today.getMonth() + 1).padStart(2, '0');
            const yyyy = today.getFullYear();
            return `${dd}/${mm}/${yyyy}`;
        }

        fetchPatients();
    </script>
</body>
</html>
