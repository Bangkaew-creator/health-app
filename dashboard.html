<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" name="viewport"/>
    <title>หน้าหลัก - Health Volunteer</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms"></script>
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
    <style>
        body { font-family: 'Sarabun', sans-serif; background-color: #f9fafb; padding-bottom: 90px; -webkit-tap-highlight-color: transparent;}
        .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; }
        .filter-pill { padding: 8px 16px; border-radius: 9999px; font-size: 12px; font-weight: 600; background-color: #eef2ff; color: #475569; transition: all 0.2s; cursor: pointer; white-space: nowrap; border: none; }
        .filter-pill.active { background-color: #00694a; color: #ffffff; box-shadow: 0 4px 10px rgba(0,105,74,0.15); }
        .loader { border: 3px solid #d8e3fb; border-bottom-color: #00694a; border-radius: 50%; width: 36px; height: 36px; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body class="text-[#111c2d]">

    <header class="pt-6 pb-4 px-4 flex justify-between items-center sticky top-0 bg-[#f9fafb]/90 backdrop-blur-md z-50">
        <div class="flex items-center gap-3">
            <div class="w-12 h-12 rounded-full bg-[#e8f5e9] flex items-center justify-center text-[#00694a] font-bold text-xl overflow-hidden border border-emerald-100 shadow-sm">
                ส
            </div>
            <div>
                <h1 class="text-sm font-bold text-[#00694a]">สมหญิง ใจดี</h1>
                <p class="text-[10px] text-gray-500 font-medium mt-0.5">หมู่ 4 บ้านทุ่งสว่าง</p>
            </div>
        </div>
        <button onclick="window.location.href='map_overview.html'" class="w-10 h-10 flex items-center justify-center rounded-full bg-white shadow-sm border border-gray-100 text-[#00694a] hover:bg-gray-50 transition-colors">
            <span class="material-symbols-outlined text-[20px]">location_on</span>
        </button>
    </header>

    <main class="max-w-2xl mx-auto pb-4 space-y-0">
        
        <h2 class="text-[17px] font-bold text-[#111c2d] px-4 mb-4">สรุปข้อมูลผู้ป่วย</h2>

        <div class="grid grid-cols-2 gap-3 px-4">
            <div class="bg-white rounded-[20px] p-4 shadow-sm border-l-4 border-[#00694a] relative">
                <div class="flex justify-between items-start">
                    <span class="material-symbols-outlined text-[#00694a] text-xl">sentiment_satisfied</span>
                    <span class="bg-[#e8f5e9] text-[#00694a] text-[9px] font-bold px-2 py-0.5 rounded-full">ปกติ</span>
                </div>
                <h3 class="text-3xl font-bold text-[#111c2d] mt-2" id="stat-social">-</h3>
                <p class="text-[11px] text-gray-600 mt-0.5 font-medium">ติดสังคม</p>
            </div>
            <div class="bg-white rounded-[20px] p-4 shadow-sm border-l-4 border-[#b45309] relative">
                <div class="flex justify-between items-start">
                    <span class="material-symbols-outlined text-[#b45309] text-xl">home</span>
                    <span class="bg-[#fef3c7] text-[#b45309] text-[9px] font-bold px-2 py-0.5 rounded-full">เฝ้าระวัง</span>
                </div>
                <h3 class="text-3xl font-bold text-[#111c2d] mt-2" id="stat-home">-</h3>
                <p class="text-[11px] text-gray-600 mt-0.5 font-medium">ติดบ้าน</p>
            </div>
        </div>

        <div class="px-4 mt-3">
            <div class="bg-white rounded-[20px] p-4 shadow-sm border-l-4 border-[#dc2626] relative">
                <div class="flex justify-between items-start">
                    <div class="flex items-center gap-2">
                        <span class="material-symbols-outlined text-[#dc2626] text-xl">bed</span>
                        <span class="text-[#dc2626] font-bold text-xs">High Priority</span>
                    </div>
                    <span class="bg-[#fee2e2] text-[#dc2626] text-[9px] font-bold px-2.5 py-0.5 rounded-full">วิกฤต</span>
                </div>
                <h3 class="text-3xl font-bold text-[#111c2d] mt-2" id="stat-bed">-</h3>
                <p class="text-[11px] text-gray-600 mt-0.5 font-medium">ติดเตียง</p>
            </div>
        </div>

        <div class="grid grid-cols-2 gap-3 px-4 mt-5">
            <button class="bg-[#00694a] text-white rounded-[20px] p-5 flex flex-col items-center justify-center gap-2 shadow-md hover:bg-[#005239] active:scale-95 transition-all">
                <span class="material-symbols-outlined text-3xl">person_add</span>
                <span class="text-[13px] font-bold">ลงทะเบียนผู้ป่วย</span>
            </button>
            <button onclick="window.location.href='assessments.html'" class="bg-[#e2e8f0] text-gray-700 rounded-[20px] p-5 flex flex-col items-center justify-center gap-2 shadow-sm hover:bg-gray-300 active:scale-95 transition-all">
                <span class="material-symbols-outlined text-3xl">assignment</span>
                <span class="text-[13px] font-bold">ประเมิน ADL</span>
            </button>
        </div>

        <div class="px-4 mt-6">
            <div class="relative">
                <span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-gray-600 text-[20px]">search</span>
                <input type="text" id="search-input" oninput="filterPatients()" class="w-full pl-11 pr-4 py-3.5 bg-[#eef2ff] border-none rounded-full text-sm focus:outline-none focus:ring-2 focus:ring-[#00694a] shadow-inner text-gray-700 placeholder-gray-500" placeholder="ค้นหาชื่อผู้ป่วย หรือ บ้านเลขที่...">
            </div>
        </div>

        <div class="flex gap-2 overflow-x-auto pb-2 mt-4 px-4 scrollbar-hidden">
            <button onclick="changeFilter('all', this)" class="filter-pill active">ทั้งหมด</button>
            <button onclick="changeFilter('visited', this)" class="filter-pill">เยี่ยมแล้ววันนี้</button>
            <button onclick="changeFilter('pending', this)" class="filter-pill">ค้างประเมิน</button>
            <button onclick="changeFilter('new', this)" class="filter-pill">รายใหม่</button>
        </div>

        <div class="flex justify-between items-end px-4 mt-4 mb-2">
            <h3 class="font-bold text-[15px] text-[#111c2d]" id="list-title">รายการที่ต้องติดตาม</h3>
            <button class="text-[11px] text-[#00694a] font-bold">ดูทั้งหมด</button>
        </div>

        <div id="loading-state" class="flex flex-col items-center justify-center py-10 space-y-3">
            <div class="loader"></div>
            <p class="text-xs text-gray-400 animate-pulse">กำลังดึงข้อมูล...</p>
        </div>

        <div id="patient-list" class="space-y-3 px-4 hidden"></div>
        
        <div id="empty-state" class="hidden text-center py-12 space-y-2 text-gray-400">
            <span class="material-symbols-outlined text-4xl">person_search</span>
            <p class="text-xs">ไม่พบข้อมูลที่ตรงตามเงื่อนไข</p>
        </div>

    </main>

    <nav class="fixed bottom-0 left-0 w-full bg-white border-t border-gray-100 shadow-[0_-4px_20px_rgba(0,0,0,0.02)] grid grid-cols-3 h-[70px] z-50">
        <button onclick="window.location.href='dashboard.html'" class="flex flex-col items-center justify-center text-[#00694a] font-bold">
            <span class="material-symbols-outlined mb-1 text-[26px]" style="font-variation-settings: 'FILL' 1;">group</span>
            <span class="text-[10px]">ผู้ป่วย</span>
        </button>
        <button onclick="window.location.href='assessments.html'" class="flex flex-col items-center justify-center text-gray-400 hover:text-gray-600 transition-colors">
            <span class="material-symbols-outlined mb-1 text-[24px]">assignment</span>
            <span class="text-[10px] font-medium">การประเมิน</span>
        </button>
        <button onclick="window.location.href='vhv_settings.html'" class="flex flex-col items-center justify-center text-gray-400 hover:text-gray-600 transition-colors">
            <span class="material-symbols-outlined mb-1 text-[24px]">settings</span>
            <span class="text-[10px] font-medium">ตั้งค่า</span>
        </button>
    </nav>

    <script>
        const API_URL = "https://script.google.com/macros/s/AKfycbyzPy7sklwURcJiqFDzlK4OEQ8616CJLuNyAjb8euQNzYJLXz_dj4UJM63w8-nI1L3r/exec";
        
        let allPatients = []; 
        let currentFilter = 'all'; 

        async function fetchPatients() {
            try {
                const response = await fetch(API_URL, { method: 'POST', body: JSON.stringify({ action: 'getAllPatients' }) });
                allPatients = await response.json();
                
                updateTopSummaryCards();
                renderPatientList();
                
                document.getElementById('loading-state').classList.add('hidden');
                document.getElementById('patient-list').classList.remove('hidden');
            } catch (error) {
                alert("ไม่สามารถเชื่อมต่อฐานข้อมูลได้");
            }
        }

        // อัปเดตตัวเลข 3 การ์ดบนสุด
        function updateTopSummaryCards() {
            document.getElementById('stat-social').innerText = allPatients.filter(p => p.group === 'ติดสังคม').length;
            document.getElementById('stat-home').innerText = allPatients.filter(p => p.group === 'ติดบ้าน').length;
            document.getElementById('stat-bed').innerText = allPatients.filter(p => p.group === 'ติดเตียง').length;
        }

        function changeFilter(filterType, element) {
            document.querySelectorAll('.filter-pill').forEach(btn => btn.classList.remove('active'));
            element.classList.add('active');
            currentFilter = filterType;
            
            // เปลี่ยนชื่อหัวข้อตาม Filter
            const titles = { 'all': 'รายชื่อผู้ป่วยทั้งหมด', 'visited': 'เยี่ยมแล้ววันนี้', 'pending': 'ค้างประเมิน (รอติดตาม)', 'new': 'ผู้ป่วยรายใหม่' };
            document.getElementById('list-title').innerText = titles[filterType];
            
            renderPatientList();
        }

        function renderPatientList() {
            const container = document.getElementById('patient-list');
            const emptyState = document.getElementById('empty-state');
            const searchKeyword = document.getElementById('search-input').value.trim().toLowerCase();
            const todayStr = getTodayString();
            
            container.innerHTML = '';
            let displayCount = 0;

            allPatients.forEach(p => {
                // กรองแคปซูล
                if (currentFilter === 'visited' && p.last_assess !== todayStr) return;
                if (currentFilter === 'pending' && p.group !== 'ยังไม่ประเมิน' && p.adl !== '-') return;
                if (currentFilter === 'new' && p.last_assess !== '') return;

                // กรองค้นหา
                const nameMatch = p.name ? p.name.toLowerCase().includes(searchKeyword) : false;
                const houseMatch = p.house_no ? p.house_no.toLowerCase().includes(searchKeyword) : false;
                if (searchKeyword && !nameMatch && !houseMatch) return;

                displayCount++;

                // รูปโปรไฟล์ (สี่เหลี่ยมขอบมน ตามภาพ)
                let avatarHtml = `<div class="w-14 h-14 rounded-xl bg-gray-100 text-gray-500 font-bold text-xl flex items-center justify-center flex-shrink-0">${p.name ? p.name.substring(0,1) : '?'}</div>`;
                if(p.profile_pic && p.profile_pic.startsWith('http')) {
                    const match = p.profile_pic.match(/d\/([a-zA-Z0-9_-]+)/) || p.profile_pic.match(/id=([a-zA-Z0-9_-]+)/);
                    if(match) avatarHtml = `<img src="https://drive.google.com/thumbnail?id=${match[1]}&sz=150" class="w-14 h-14 rounded-xl object-cover flex-shrink-0 shadow-sm">`;
                }

                // สีและป้ายบอกกลุ่มด้านขวา
                let badgeColor = 'bg-gray-100 text-gray-600';
                let badgeText = 'ปกติ';
                if (p.group === 'ติดสังคม') { badgeColor = 'bg-[#00694a] text-white'; badgeText = 'ปกติ'; }
                else if (p.group === 'ติดบ้าน') { badgeColor = 'bg-[#b45309] text-white'; badgeText = 'เฝ้าระวัง'; }
                else if (p.group === 'ติดเตียง') { badgeColor = 'bg-[#dc2626] text-white'; badgeText = 'ต้องเยี่ยม'; }

                const cardHtml = `
                    <div onclick="window.location.href='patient_profile.html?id=${p.id}'" class="bg-white rounded-2xl p-3.5 shadow-sm border border-gray-100 flex items-center gap-3 cursor-pointer active:scale-[0.98] transition-transform">
                        ${avatarHtml}
                        <div class="flex-1 min-w-0">
                            <h3 class="font-bold text-[14px] text-gray-900 truncate">${p.name || 'ไม่ระบุชื่อ'}</h3>
                            <p class="text-[11px] text-gray-500 mt-0.5 truncate">บ้านเลขที่ ${p.house_no || '-'} • ${p.group || 'ยังไม่ประเมิน'}</p>
                        </div>
                        <div class="flex flex-col items-end justify-center gap-1.5 flex-shrink-0">
                            <span class="${badgeColor} text-[10px] font-bold px-2.5 py-0.5 rounded-full shadow-sm">${badgeText}</span>
                            <span class="text-[9px] text-gray-400 italic">ADL: ${p.adl || '-'}</span>
                        </div>
                    </div>
                `;
                container.insertAdjacentHTML('beforeend', cardHtml);
            });

            if (displayCount === 0) emptyState.classList.remove('hidden');
            else emptyState.classList.add('hidden');
        }

        function filterPatients() { renderPatientList(); }

        function getTodayString() {
            const today = new Date();
            const dd = String(today.getDate()).padStart(2, '0');
            const mm = String(today.getMonth() + 1).padStart(2, '0');
            const yyyy = today.getFullYear();
            return `${dd}/${mm}/${yyyy}`;
        }

        fetchPatients();
    </script>
</body>
</html>
