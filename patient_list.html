<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="utf-8"/><meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;600&display=swap" rel="stylesheet"/>
</head>
<body class="bg-gray-50 p-4">
    <a href="dashboard.html" class="text-[#00694a] font-bold">← ย้อนกลับ</a>
    <div id="patient-container" class="mt-4 space-y-3"></div>
    <script>
        const API_URL = "https://script.google.com/macros/s/AKfycbyzPy7sklwURcJiqFDzlK4OEQ8616CJLuNyAjb8euQNzYJLXz_dj4UJM63w8-nI1L3r/exec";
        fetch(API_URL, { method: 'POST', body: JSON.stringify({ action: 'getAllPatients' }) })
            .then(res => res.json())
            .then(data => {
                const container = document.getElementById('patient-container');
                data.forEach(p => {
                    container.innerHTML += `<div class="bg-white p-4 rounded-xl shadow">${p.name} (หมู่ ${p.village_no})</div>`;
                });
            });
    </script>
</body>
</html>
