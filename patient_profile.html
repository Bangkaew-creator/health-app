<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" name="viewport"/>
    <title>ข้อมูลผู้ป่วย - Health Volunteer</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms"></script>
    <link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@400;500;600;700&family=Sarabun:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
    <style>
        body { font-family: 'Sarabun', 'Be Vietnam Pro', sans-serif; background-color: #f9f9ff; min-height: 100dvh; -webkit-tap-highlight-color: transparent;}
        .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; }
        .loader-small { border: 3px solid #d8e3fb; border-bottom-color: #00694a; border-radius: 50%; width: 30px; height: 30px; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body class="text-[#111c2d] pb-24">

    <header class="bg-[#00694a] sticky top-0 z-50 shadow-md flex justify-between items-center w-full px-4 h-16 text-white">
        <div class="flex items-center gap-3">
            <button onclick="window.history.back()" class="w-10 h-10 flex items-center justify-center rounded-full hover:bg-white/20 transition-colors">
                <span class="material-symbols-outlined">arrow_back</span>
            </button>
            <h1 class="text-lg font-bold">แฟ้มประวัติผู้ป่วย</h1>
        </div>
        <button class="w-10 h-10 flex items-center justify-center rounded-full hover:bg-white/20 transition-colors">
            <span class="material-symbols-outlined">edit_square</span>
        </button>
    </header>

    <main class="max-w-2xl mx-auto p-4 space-y-4">
        
        <div id="loading-state" class="flex flex-col items-center justify-center py-16 space-y-4">
            <div class="loader-small"></div>
            <p class="text-[#526069] text-sm animate-pulse">กำลังดึงข้อมูลประวัติ...</p>
        </div>

        <div id="profile-content" class="hidden space-y-4">
            
            <div class="bg-white rounded-[20px] p-5 shadow-sm border border-[#bdcac1]/30 relative overflow-hidden">
                <div class="absolute top-0 right-0 w-24 h-24 bg-[#00694a]/5 rounded-bl-full -z-10"></div>
                <div class="flex items-center gap-4">
                    <div class="w-16 h-16 bg-[#e7eeff] text-[#00694a] rounded-full flex items-center justify-center font-bold text-3xl border-2 border-[#d8e3fb] shadow-inner" id="profile-initial">
                        ?
                    </div>
                    <div class="flex-1">
                        <h2 class="text-xl font-bold text-[#00694a] leading-tight" id="profile-name">โหลดข้อมูล...</h2>
                        <p class="text-sm text-[#526069] mt-1" id="profile-age">อายุ - ปี</p>
                    </div>
                </div>
                
                <div class="grid grid-cols-2 gap-3 mt-5 pt-4 border-t border-[#bdcac1]/30">
                    <div>
                        <p class="text-[10px] text-[#526069] font-bold">กลุ่มผู้ป่วย</p>
                        <span id="profile-group" class="bg-[#6e7a72] text-white px-3 py-1 rounded-full text-xs font-bold inline-block mt-1">ยังไม่ประเมิน</span>
                    </div>
                    <div>
                        <p class="text-[10px] text-[#526069] font-bold">คะแนน ADL ล่าสุด</p>
                        <p id="profile-adl" class="text-xl font-bold text-[#111c2d]">-</p>
                    </div>
                </div>
            </div>

            <div class="bg-white rounded-[20px] p-5 shadow-sm border border-[#bdcac1]/30">
                <h3 class="text-sm font-bold flex items-center gap-2 mb-4 text-[#00694a]">
                    <span class="material-symbols-outlined">badge</span> ข้อมูลส่วนบุคคล
                </h3>
                <div class="space-y-3">
                    <div class="flex justify-between items-center border-b border-gray-50 pb-2">
                        <span class="text-xs text-[#526069]">เลขบัตรประชาชน</span>
                        <span class="text-sm font-semibold" id="profile-idcard">-</span>
                    </div>
                    <div class="flex justify-between items-center border-b border-gray-50 pb-2">
                        <span class="text-xs text-[#526069]">วัน/เดือน/ปีเกิด</span>
                        <span class="text-sm font-semibold" id="profile-dob">-</span>
                    </div>
                    <div class="flex flex-col gap-1 pt-1">
                        <span class="text-xs text-[#526069]">ที่อยู่ปัจจุบัน</span>
                        <span class="text-sm font-semibold" id="profile-address">-</span>
                    </div>
                </div>
            </div>

            <div class="pt-4">
                <button onclick="startADL()" class="w-full bg-[#F59E0B] text-white py-4 rounded-xl font-bold shadow-lg hover:bg-[#D97706] active:scale-95 transition-all flex items-center justify-center gap-2 text-base">
                    <span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">assignment</span>
                    เริ่มทำแบบประเมิน ADL
                </button>
            </div>

        </div>
    </main>

    <script>
        // ===== ใส่ URL ของคุณตรงนี้ =====
        const API_URL = "https://script.google.com/macros/s/AKfycbyzPy7sklwURcJiqFDzlK4OEQ8616CJLuNyAjb8euQNzYJLXz_dj4UJM63w8-nI1L3r/exec";
        
        // ดึงพารามิเตอร์ ID จาก URL (เช่น ?id=HN-2026...)
        const urlParams = new URLSearchParams(window.location.search);
        const patientId = urlParams.get('id');

        async function loadPatientProfile() {
            if (!patientId) {
                alert("ไม่พบรหัสผู้ป่วย");
                window.location.href = 'dashboard.html';
                return;
            }

            try {
                const response = await fetch(API_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'text/plain;charset=utf-8' },
                    body: JSON.stringify({ action: 'getPatientById', id: patientId })
                });
                
                const data = await response.json();
                
                if (data.error) {
                    alert(data.error);
                    window.history.back();
                    return;
                }

                // นำข้อมูลมาแสดงผลใน HTML
                document.getElementById('profile-initial').innerText = data.name.substring(0, 1);
                document.getElementById('profile-name').innerText = data.prefix + data.name;
                document.getElementById('profile-age').innerText = `อายุ ${data.age} ปี`;
                document.getElementById('profile-idcard').innerText = data.id_card || '-';
                document.getElementById('profile-dob').innerText = data.dob || '-';
                document.getElementById('profile-address').innerText = `บ้านเลขที่ ${data.house_no} หมู่ ${data.village_no}`;
                
                document.getElementById('profile-adl').innerText = data.adl;

                // จัดการสีกรุ๊ป
                const groupBadge = document.getElementById('profile-group');
                groupBadge.innerText = data.group;
                if (data.group === 'ติดเตียง') groupBadge.className = "bg-[#ba1a1a] text-white px-3 py-1 rounded-full text-xs font-bold inline-block mt-1";
                else if (data.group === 'ติดบ้าน') groupBadge.className = "bg-[#F59E0B] text-white px-3 py-1 rounded-full text-xs font-bold inline-block mt-1";
                else if (data.group === 'ติดสังคม') groupBadge.className = "bg-[#00694a] text-white px-3 py-1 rounded-full text-xs font-bold inline-block mt-1";

                // สลับหน้าจอจาก Loading เป็น Content
                document.getElementById('loading-state').classList.add('hidden');
                document.getElementById('profile-content').classList.remove('hidden');

            } catch (error) {
                alert("เชื่อมต่อฐานข้อมูลล้มเหลว: " + error);
            }
        }

        function startADL() {
            alert("เตรียมตัวเข้าสู่หน้าประเมิน ADL สำหรับรหัส: " + patientId);
            // ในเฟสถัดไป เราจะเปลี่ยนให้ลิงก์ไปหน้า adl_assessment.html?id=... ครับ
        }

        // เริ่มโหลดข้อมูลเมื่อเปิดหน้าต่าง
        loadPatientProfile();
    </script>
</body>
</html>
